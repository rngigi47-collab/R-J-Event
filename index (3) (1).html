/* ------------------------------------------------------------------------
   STORAGE HELPERS
------------------------------------------------------------------------- */
const RSVP_KEY = "dowry-ceremony-rsvp-entries";

function loadEntries() {
  try {
    const raw = localStorage.getItem(RSVP_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveEntry(entry) {
  const current = loadEntries();
  const updated = [...current, entry];
  localStorage.setItem(RSVP_KEY, JSON.stringify(updated));
  return updated;
}

function buildWhatsAppMessage(entry) {
  const lines = [
    `RSVP added to the guest list — Dowry Ceremony (${EVENT.dateLabel})`,
    `Name: ${entry.name}`,
    `Attending: ${entry.attending === "yes" ? "Joyfully accept" : entry.attending === "maybe" ? "Not sure yet" : "Unavailable"}`,
  ];
  if (entry.attending !== "no") {
    lines.push(`Party size: ${entry.count}`);
    if (entry.guestNames) lines.push(`Guest names: ${entry.guestNames}`);
    lines.push(`Dietary: ${entry.dietary === "Other (please specify)" ? entry.dietaryOther : entry.dietary}`);
    lines.push(`Travelling from: ${(ROUTES[entry.departure] && ROUTES[entry.departure].label) || entry.departure}`);
    if (entry.accommodation) lines.push(`Accommodation needed: ${entry.accommodationDuration}, ${entry.accommodationLocation}`);
    if (entry.transport) lines.push(`Transport needed for: ${entry.transportCount} people`);
    if (entry.contactPhone) lines.push(`Contact number: ${entry.contactPhone}`);
  }
  if (entry.message) lines.push(`Message: ${entry.message}`);
  lines.push(`— this has already been saved to the RSVP list, sending here as a heads up.`);
  return lines.join("\n");
}

function whatsAppLink(entry, number) {
  return `https://wa.me/${number}?text=${encodeURIComponent(buildWhatsAppMessage(entry))}`;
}

/* ------------------------------------------------------------------------
   RSVP PAGE
------------------------------------------------------------------------- */
function RsvpPage() {
  const [copied, setCopied] = useState(false);
  const copyLink = async () => {
    const link = `${window.location.origin}${window.location.pathname}#rsvp`;
    try {
      await navigator.clipboard.writeText(link);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch (e) {
      /* clipboard may be unavailable */
    }
  };
  const [form, setForm] = useState({
    name: "",
    guestNames: "",
    attending: "yes",
    count: 1,
    dietary: "No restrictions",
    dietaryOther: "",
    accommodation: false,
    accommodationDuration: "1 night",
    accommodationLocation: "Nyeri",
    transport: false,
    transportCount: 1,
    contactPhone: "",
    departure: "nairobi",
    message: "",
  });
  const [status, setStatus] = useState("idle"); // idle | saving | done | error

  const update = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const [savedEntry, setSavedEntry] = useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.name.trim()) return;
    setStatus("saving");
    const entry = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
      ...form,
      submittedAt: new Date().toISOString(),
    };
    try {
      saveEntry(entry);
      // Send to the Google Sheet (fire-and-forget — Apps Script doesn't
      // return readable CORS responses, so we don't wait on the result).
      try {
        fetch(EVENT.sheetsEndpoint, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(entry),
        });
      } catch (sheetErr) {
        /* if this fails, the response is still saved locally and via WhatsApp */
      }
      setSavedEntry(entry);
      setStatus("done");
    } catch (err) {
      setStatus("error");
    }
  };

  if (status === "done") {
    return (
      <div style={{ maxWidth: 560, margin: "80px auto", textAlign: "center", padding: "0 20px" }} className="ngu-fade-in">
        <Sparkles size={34} color="var(--burnt)" />
        <h2 className="ngu-display" style={{ fontSize: "1.7rem", margin: "16px 0 8px" }}>Asante sana!</h2>
        <p style={{ lineHeight: 1.7 }}>
          Your RSVP has been recorded. If you'd also like to send Ruth or John a direct
          message about it, you're welcome to tap below.
        </p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", marginTop: 18 }}>
          <a className="ngu-btn-secondary" style={{ textDecoration: "none", display: "inline-block" }}
             href={whatsAppLink(savedEntry, EVENT.ruthWhatsApp)} target="_blank" rel="noopener noreferrer">
            Message Ruth on WhatsApp
          </a>
          <a className="ngu-btn-secondary" style={{ textDecoration: "none", display: "inline-block" }}
             href={whatsAppLink(savedEntry, EVENT.johnWhatsApp)} target="_blank" rel="noopener noreferrer">
            Message John on WhatsApp
          </a>
        </div>
        <button className="ngu-btn-secondary" style={{ marginTop: 18, borderColor: "transparent" }} onClick={() => { setStatus("idle"); setForm({ ...form, name: "", guestNames: "", message: "" }); }}>
          Submit another response
        </button>
        <p style={{ fontSize: "0.8rem", color: "var(--cinnamon)", marginTop: 20 }}>{EVENT.hostContact}</p>
      </div>
    );
  }

  return (
    <div className="ngu-fade-in" style={{ maxWidth: 720, margin: "0 auto", padding: "50px 20px 80px" }}>
      <SectionEyebrow>Kindly respond by {EVENT.rsvpBy}</SectionEyebrow>

      <p style={{ textAlign: "center", color: "var(--cinnamon)", marginBottom: 18 }}>
        Please let Ruth and John know if you'll be joining them in Othaya.

        <button type="button" className="ngu-btn-secondary" style={{ fontSize: "0.78rem", padding: "8px 18px" }} onClick={copyLink}>

      </div>

      <form onSubmit={handleSubmit} className="ngu-card" style={{ padding: "34px 28px", display: "grid", gap: 22 }}>

          <label className="ngu-label" htmlFor="name">Your full name *</label>

------------------------------------------------------------------------- */
function useCountdown(targetISO) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000 * 30);
    return () => clearInterval(t);
  }, []);
  const target = new Date(targetISO).getTime();
  const diff = Math.max(0, target - now);
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  return { days, hours, minutes, isPast: target - now < 0 };
}

function downloadICS() {
  const start = EVENT.dateISO.replace(/[-:]/g, "").split(".")[0].replace("+03:00", "");
  const ics = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "BEGIN:VEVENT",
    `SUMMARY:${EVENT.monogram} Dowry Ceremony`,
    `DTSTART:${start}Z`,
    `LOCATION:${EVENT.venue}`,
    `DESCRIPTION:Dowry Ceremony for ${EVENT.couple}. Starts at ${EVENT.venue}, 11:30 AM.`,
    "END:VEVENT", "END:VCALENDAR",
  ].join("\n");
  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "dowry-ceremony.ics"; a.click();
  URL.revokeObjectURL(url);
}

        ) : (

                <div key={i}>
                  <div className="ngu-display" style={{ fontSize: "2.4rem", fontWeight: 700, color: "var(--burnt)" }}>{v}</div>
                  <div style={{ fontSize: "0.75rem", textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--cinnamon)" }}>{l}</div>
                </div>
              ))}
            </div>
          </>
        )}
        <button className="ngu-btn-secondary" style={{ marginTop: 24 }} onClick={downloadICS}>Add to calendar</button>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------------
   ROOT APP
------------------------------------------------------------------------- */
function App() {
  const getPageFromHash = () => {
    const h = (window.location.hash || "").replace("#", "");
    return PAGES.some((p) => p.id === h) ? h : "home";
  };
  const [page, setPageState] = useState(getPageFromHash);

  const setPage = useCallback((id) => {
    setPageState(id);
    try {
      window.history.replaceState(null, "", `#${id}`);
    } catch (e) {
      /* ignore */
    }
  }, []);

  useEffect(() => {
    const onHashChange = () => setPageState(getPageFromHash());
    window.addEventListener("hashchange", onHashChange);
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  useEffect(() => { window.scrollTo({ top: 0, behavior: "smooth" }); }, [page]);

  const Page = {
    home: HomePage, rsvp: RsvpPage, palette: PalettePage, programme: ProgrammePage,
    travel: TravelPage, reminders: RemindersPage,
  }[page];

  return (
    <div className="ngu-root">
      <GlobalStyle />
      <NavBar page={page} setPage={setPage} />
      <main>
        <Page setPage={setPage} />
      </main>
      <footer style={{ background: "var(--chocolate)", color: "var(--cream)", textAlign: "center", padding: "26px 20px", fontSize: "0.8rem" }}>
        <div className="ngu-script" style={{ fontSize: "1.3rem", marginBottom: 4, color: "var(--apricot)" }}>{EVENT.monogram}</div>
        <div>{EVENT.couple} · {EVENT.dateLabel}</div>
        <div style={{ marginTop: 4, opacity: 0.85 }}>{EVENT.hostContact}</div>
      </footer>
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
</html>
